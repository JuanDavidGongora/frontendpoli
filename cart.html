<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - TechGamers</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#catalog">Catálogo</a></li>
                <li><a href="cart.html" class="cart-link">Carrito <span id="cart-badge" class="cart-badge">0</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="cart-section">
            <h2>Carrito de Compras</h2>
            <p class="cart-summary">Artículos en el carrito: <strong id="cart-count">0</strong></p>
            <div id="cart-items" class="cart-items"></div>
            <div class="cart-footer">
                <p class="cart-total-label">Total a pagar: <strong id="cart-total">$0</strong></p>
                <div class="cart-actions">
                    <button id="checkout-btn" class="btn-primary">Realizar pedido</button>
                    <button id="clear-cart-btn" class="btn-secondary">Vaciar carrito</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 TechGamers Solution. Todos los derechos reservados.</p>
    </footer>

    <script src="scripts/products.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/cart.js"></script>
    <script src="scripts/cart-page.js"></script>
</body>
</html>
